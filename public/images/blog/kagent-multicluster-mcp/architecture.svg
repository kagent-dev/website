<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Kagent multi-cluster MCP federation architecture</title>
  <desc id="desc">One Kagent agent connects to a RemoteMCPServer, which reaches Agentgateway Virtual MCP. Agentgateway routes to Kubernetes MCP servers in multiple application clusters and exposes prefixed tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="70" y="86" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="#0f172a">One agent-facing MCP endpoint, many cluster-local tools</text>
  <text x="70" y="126" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Kagent talks to one RemoteMCPServer. Agentgateway Virtual MCP federates the application-cluster MCP servers.</text>

  <rect x="70" y="185" width="330" height="450" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="110" y="235" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Agent cluster</text>
  <rect x="110" y="280" width="250" height="94" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="135" y="322" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">Kagent Agent</text>
  <text x="135" y="352" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Chooses cluster-prefixed tools</text>
  <rect x="110" y="430" width="250" height="94" rx="18" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
  <text x="135" y="472" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#6d28d9">RemoteMCPServer</text>
  <text x="135" y="502" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Single MCP URL</text>

  <rect x="525" y="255" width="350" height="270" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="565" y="300" width="270" height="120" rx="22" fill="url(#primary)"/>
  <text x="610" y="352" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Agentgateway</text>
  <text x="610" y="386" font-family="Inter, Arial, sans-serif" font-size="20" fill="#dbeafe">Virtual MCP</text>
  <text x="565" y="462" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Federates targets</text>
  <text x="565" y="490" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">and prefixes tools by cluster</text>

  <rect x="1010" y="175" width="320" height="220" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1050" y="226" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">Cluster A</text>
  <rect x="1050" y="265" width="240" height="74" rx="16" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
  <text x="1075" y="311" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">Kubernetes MCP</text>
  <text x="1050" y="365" font-family="Inter, Arial, sans-serif" font-size="17" fill="#475569">Tools become cluster-a_*</text>

  <rect x="1010" y="455" width="320" height="220" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1050" y="506" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">Cluster B</text>
  <rect x="1050" y="545" width="240" height="74" rx="16" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="1075" y="591" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">Kubernetes MCP</text>
  <text x="1050" y="645" font-family="Inter, Arial, sans-serif" font-size="17" fill="#475569">Tools become cluster-b_*</text>

  <path d="M235 374 L235 430" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M360 477 C455 477 455 360 555 360" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M835 330 C925 270 925 285 1010 285" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M835 420 C925 520 925 565 1010 565" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="500" y="590" width="420" height="145" rx="20" fill="#0f172a"/>
  <text x="535" y="628" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Example federated tools</text>
  <text x="535" y="663" font-family="Menlo, Consolas, monospace" font-size="16" fill="#bfdbfe">cluster-a_k8s_get_resources</text>
  <text x="535" y="696" font-family="Menlo, Consolas, monospace" font-size="16" fill="#ddd6fe">cluster-b_k8s_describe_resource</text>
</svg>
